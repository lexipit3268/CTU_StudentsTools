<!doctype html>
<html lang="">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css"
      integrity="sha512-DxV+EoADOkOygM4IR9yXP8Sb2qwgidEmeqAEmDKIOfPRQZOWbXCzLC6vjbZyy0vPisbH2SyW27+ddLVCN+OMzQ=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.css"
      integrity="sha512-kJlvECunwXftkPwyvHbclArO8wszgBGisiLeuDFwNM8ws+wKIw0sv1os3ClWZOcrEB2eRXULYUsm8OVRGJKwGA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="./src/css/base.css" />
    <link rel="stylesheet" href="./src/css/components.css" />
    <link rel="stylesheet" href="./src/css/main.css" />
    <link
      rel="shortcut icon"
      href="./public/assets/images/CTU_logo.png"
      type="image/x-icon"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>So sánh Học bổng</title>
  </head>

  <body class="">
    <div class="sticky top-0 z-[11]">
      <header id="header" class="shadow-lg"></header>
    </div>
    <main class="w-full flex flex-col items-center justify-center">
      <div class="card flex flex-row gap-9">
        <div class="container__form">
          <form action="">
            <div class="form__body flex flex-col justify-center">
              <div
                id="competitors-list"
                class="grid grid-cols-1 md:grid-cols-2 gap-4"
              ></div>

              <div
                class="button-container flex flex-col items-center gap-2 w-full"
              >
                <button
                  id="add-btn"
                  type="button"
                  class="text-white bg-gradient-to-r from-cyan-500 to-blue-500 hover:bg-gradient-to-bl focus:ring-2 focus:outline-none focus:ring-cyan-300 dark:focus:ring-cyan-800 font-medium rounded-lg text-center cursor-pointer w-full h-fit p-4!"
                >
                  Thêm đối thủ
                </button>
                <button
                  id="compare-btn"
                  type="button"
                  class="text-white bg-gradient-to-r from-cyan-500 to-blue-500 hover:bg-gradient-to-bl focus:ring-2 focus:outline-none focus:ring-cyan-300 dark:focus:ring-cyan-800 font-medium rounded-lg text-center cursor-pointer w-full h-fit p-4!"
                >
                  So sánh điểm
                </button>
              </div>
            </div>
          </form>
        </div>
        <div
          class="result-content slideIn flex flex-col gap-2 flex-1 p-4! h-fit"
          id="result-content"
        >
          <h1 class="result-header text-xl font-bold text-center">
            Bảng xếp hạng so sánh
          </h1>
          <div class="result flex flex-col gap-1" id="result-list"></div>
          <div class="result-footer text-center mt-4 text-white flex flex-col">
            <h5 class="text-sm">Người xuất sắc nhất</h5>
            <h2 class="text-3xl font-bold" id="winner-name">---</h2>
            <small class="text-[12px] mt-2 block" id="winner-reason"></small>
            <small class="text-[9px]">Kết quả mang tính chất tham khảo</small>
          </div>
        </div>
      </div>
    </main>
    <footer id="footer"></footer>
    <div id="toast-box"></div>
    <script src="./src/js/main.js" type="module"></script>
    <script src="./src/js/hocbong.js" type="module"></script>
  </body>
</html>
