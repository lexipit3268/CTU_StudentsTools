<!DOCTYPE html>
<html lang="">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css"
      integrity="sha512-DxV+EoADOkOygM4IR9yXP8Sb2qwgidEmeqAEmDKIOfPRQZOWbXCzLC6vjbZyy0vPisbH2SyW27+ddLVCN+OMzQ=="
      crossorigin="anonymous" referrerpolicy="no-referrer" />
   <link rel="stylesheet" href="./src/css/base.css">
   <link rel="stylesheet" href="./src/css/components.css">
   <link rel="stylesheet" href="./src/css/main.css">
   <link rel="shortcut icon" href="https://www.ctu.edu.vn/images/branding/logo/CTU_logo.png" type="image/x-icon">
   <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
   <title>Quy đổi điểm V-SATU</title>
</head>

<body>
   <header id="header" class=""></header>
   <main class="w-full flex flex-col items-center justify-center">
      <div class="card flex flex-row gap-9">
         <div class="container__form">
            <form action="">
               <div class="form__body flex flex-col justify-center">
                  <div class="form__select">
                     <label for="tohop">Chọn tổ hợp</label>
                     <select name="tohop" id="tohop" class="">
                        <option selected>--Chọn tổ hợp--</option>
                        <option value="A00">A00: Toán, Vật Lý, Hóa Học</option>
                        <option value="A01">A01: Toán, Vật Lý, Tiếng Anh</option>
                        <option value="A02">A02: Toán, Vật Lý, Sinh Học</option>
                        <option value="B00">B00: Toán, Hóa Học, Sinh Học</option>
                        <option value="B03">B03: Toán, Sinh Học, Ngữ Văn</option>
                        <option value="B08">B08: Toán, Sinh Học, Tiếng Anh</option>
                        <option value="C00">C00: Ngữ Văn, Lịch Sử, Địa Lý</option>
                        <option value="C01">C01: Ngữ Văn, Toán, Vật Lý</option>
                        <option value="C02">C02: Ngữ Văn, Toán, Hóa Học</option>
                        <option value="C04">C04: Ngữ Văn, Toán, Địa Lý</option>
                        <option value="D01">D01: Ngữ Văn, Toán, Tiếng Anh</option>
                        <option value="D07">D07: Toán, Hóa Học, Tiếng Anh</option>
                        <option value="D09">D09: Toán, Sinh Học, Tiếng Anh</option>
                        <option value="D14">D14: Ngữ Văn, Lịch Sử, Tiếng Anh</option>
                        <option value="D15">D15: Ngữ Văn, Địa Lý, Tiếng Anh</option>
                     </select>
                  </div>
                  <div class="container__form__input" id="subject-inputs">
                     <!-- <div class="form__input">
                        <label for="toan">Toán</label>
                        <input type="number" name="" id="toan">
                     </div>
                     <div class="form__input">
                        <label for="vatly">Vật lý</label>
                        <input type="number" name="" id="vatly">
                     </div>
                     <div class="form__input">
                        <label for="hoahoc">Hóa học</label>
                        <input type="number" name="" id="hoahoc">
                     </div> -->
                  </div>
                  <button id="convert-btn" type="button"
                     class="text-white bg-gradient-to-r from-cyan-500 to-blue-500 hover:bg-gradient-to-bl focus:ring-2 focus:outline-none focus:ring-cyan-300 dark:focus:ring-cyan-800 font-medium rounded-lg text-sm text-center">
                     Quy đổi điểm
                  </button>
               </div>
            </form>
         </div>
         <div class="result-content slideIn bg-gradient-to-r from-cyan-500 to-blue-500 flex flex-col gap-2 flex-1" id="result-content">
            
            <h1 class="result-header text-xl font-bold text-center">Kết quả quy đổi</h1>
            
            <div class="result flex flex-col gap-6" id="result">
            </div>

            <div class="result-footer text-center mt-4 text-white">
               <h5 class="text-sm">Tổng điểm tổ hợp</h5>
               <h2 class="text-3xl font-bold" id="result-total">28.4</h2>
            </div>
         </div>
   </main>
   <footer id="footer"></footer>
   <script src="./src/js/main.js" type="module"></script>
   <script src="./src/js/vsatConvert.js" type="module"></script>
</body>

</html>
